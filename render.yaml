services:
  - type: web
    name: flipbook-modal-backend
    runtime: python
    rootDir: apps/modal-backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python local_server.py
    healthCheckPath: /health
    envVars:
      - key: SILICONFLOW_API_KEY
        sync: false
      - key: FAL_KEY
        sync: false

  - type: web
    name: openflipbook-web
    runtime: docker
    plan: free
    dockerfilePath: apps/web/Dockerfile
    dockerContext: .
    envVars:
      - key: MODAL_API_URL
        value: https://flipbook-modal-backend.onrender.com
      - key: NEXT_PUBLIC_SITE_URL
        value: https://openflipbook-web.onrender.com
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: openflipbook
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        value: openflipbook
      - key: R2_PUBLIC_BASE_URL
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: NEXT_PUBLIC_SENTRY_DSN
        sync: false
